<div *ngIf="loading">Loading...</div>
<div *ngIf="error">{{ error }}</div>

<div class="coffee-list" *ngIf="!loading && !error">
  <div class="coffee-card" *ngFor="let coffee of coffees">
    <h2>{{ coffee.title }}</h2>
    <img [src]="coffee.image" alt="{{ coffee.title }}" width="150">
    <p>{{ coffee.description }}</p>
    <ul>
      <li *ngFor="let ingredient of coffee.ingredients">{{ ingredient }}</li>
    </ul>
  </div>
</div>
