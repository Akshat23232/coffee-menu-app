<div *ngIf="loading" class="loading">Loading coffees…</div>
<div *ngIf="error" class="error">{{ error }}</div>

<div *ngIf="!loading && !error" class="coffee-grid">
  <div *ngFor="let coffee of coffees" class="coffee-card">
    <img *ngIf="coffee.image" [src]="coffee.image" alt="{{ coffee.title }}" />
    <h3>{{ coffee.title }}</h3>
    <p>{{ coffee.description }}</p>
    <ul>
      <li *ngFor="let ing of coffee.ingredients">{{ ing }}</li>
    </ul>
  </div>
</div>
